# Raycast — atomic brand kit (machine-readable)
# Generated from the Design System Atlas. Hand this folder to a human or an agent.
kit_version: "1.0"
system:
  id: "17"
  name: "Raycast"
  reference_url: "https://raycast.com"
  award: "Awwwards Site of the Day 2024"
  category: "Developer Tool / Sleek Dark"
  mode: "dark"
voice:
  tagline: "A precision dark command-palette aesthetic where glass panels and purple glow simulate real interface depth."
  signature: "The command palette is the aesthetic language — glass panels with purple glow trace back to the product's command bar. Keyboard shortcut badges in monospace appear everywhere, and perspective-shifted UI screenshots float in 3D space. Color pops precisely because everything else stays neutral."
principles:
  - "Dark-first, not dark-mode — near-black is the canvas"
  - "Depth through intentional layering, not decoration"
  - "Command palette as the core interface metaphor"
  - "Keyboard-native, developer-first signaling"
  - "Radical restraint in saturation — one touch of color at a time"
typography:
  font_sans: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font_display: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font_mono: "'JetBrains Mono', 'Fira Code', monospace"
  scale:
    display: "72px"
    h1: "56px"
    h2: "40px"
    body: "16px"
  weight_heading: 600
  weight_body: 400
  tracking_display: "-0.04em"
