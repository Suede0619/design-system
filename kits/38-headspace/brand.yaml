# Headspace — atomic brand kit (machine-readable)
# Generated from the Design System Atlas. Hand this folder to a human or an agent.
kit_version: "1.0"
system:
  id: "38"
  name: "Headspace"
  reference_url: "https://headspace.com"
  award: "Webby + Apple Design Award"
  category: "Wellness / Warm Illustration"
  mode: "light"
voice:
  tagline: "Every interaction feels like a gentle exhale — softness as a feature, not a weakness."
  signature: "Heavy 20–28px border-radius on everything creates a soft, unthreatening environment, paired with a single warm orange used only for action. Custom organic illustrations build a world competitors can't copy, and a 4-second breathing animation rhythm — even loading states are breathing circles, never spinners — permeates all motion."
principles:
  - "Wellness doesn't have to look clinical — softness is a feature"
  - "Warmth through radius — soft, unthreatening environment"
  - "Orange as emotional anchor, used only for action"
  - "Illustration over photography for a unique world"
  - "Breathing as design language — the 4-second rhythm permeates motion"
