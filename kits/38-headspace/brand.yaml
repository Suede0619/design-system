  font_sans: "\"GT Walsheim\", -apple-system, sans-serif"
  font_display: "\"GT Walsheim\", -apple-system, sans-serif"
  font_mono: ""
  scale:
    display: "48px"
    h1: "36px"
    h2: "28px"
    body: "16px"
  weight_heading: 700
  weight_body: 400
  tracking_display: "-0.03em"
