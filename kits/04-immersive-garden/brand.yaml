system:
  id: "04"
  name: "Immersive Garden"
  reference_url: "https://immersive-g.com"
  award: "Awwwards Agency of the Year 2025"
  category: "Dark Luxury / WebGL Portfolio"
  mode: "dark"
voice:
  tagline: "Dark opulence meets digital craftsmanship — cinematic WebGL scenes, refined serif type, whispered gold accents."
  signature: "A custom gold cursor that breathes and transforms by context — shrinking over text, expanding with a 'View' label over images, a gentle gold dot over the background. Combined with WebGL shader transitions between pages, the whole experience feels like navigating a gallery rather than a website."
principles:
  - "Interaction as performance art"
  - "Color is scarce — scarcity creates value"
  - "Gold only for interactive elements and the cursor, never backgrounds"
  - "Warm off-white text, never pure white"
  - "WebGL depth that flat design cannot touch"
