# ComPsych — atomic brand kit (machine-readable)
# Generated from the Design System Atlas. Hand this folder to a human or an agent.
kit_version: "1.0"
system:
  id: "14"
  name: "ComPsych"
  reference_url: "https://www.compsych.com"
  award: "CSSDA #9 of 2025 (8.74)"
  category: "Corporate Wellness / Warm"
  mode: "light"
voice:
  tagline: "Rounded warmth and flat-vector people de-medicalize corporate wellness with AAA-grade accessibility."
  signature: "ComPsych's signature is maximum roundness — 24px card radius, 16px button radius — paired with illustration-native characters to psychologically de-medicalize wellness. Tinted rounded illustration pods frame flat vector people, and layered depth comes from background color relationships rather than dramatic shadows."
principles:
  - "Rounded everything — no sharp corners, nothing institutional"
  - "Illustration-forward — warm, diverse flat vector people over photography"
  - "Documentation-first layout with persistent sidebar"
  - "Color-coded content using a warm teal/coral/cream palette"
  - "Feels like a trusted colleague's office, not a hospital waiting room"
typography:
  font_sans: "\"DM Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif"
  font_display: "\"DM Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif"
  font_mono: "\"DM Mono\", \"Courier New\", monospace"
  scale:
    display: "48px"
    h1: "32px"
    h2: "28px"
    body: "16px"
  weight_heading: 700
  weight_body: 400
  tracking_display: "-0.02em"
color:
  bg: "#FFF8F0"
  bgAlt: "#E0F4F4"
  surface: "#FFFFFF"
  text: "#1A2744"
  textMuted: "#6B7A9E"
  border: "#D8D0C8"
  primary: "#0A8A8A"
  primaryHover: "#06615F"
  onPrimary: "#FFFFFF"
  accent2: "#E86C5A"
