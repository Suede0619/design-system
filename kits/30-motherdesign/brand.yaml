voice:
  tagline: "Light Canela serif on warm cream — an art book that happens to be a website."
  signature: "A masterclass in typographic restraint — Canela serif at light weight creates luxury without ostentation, using thin serifs and silence to communicate taste where others use bold. Warm cream backgrounds and barely-there hierarchy make the site feel like an art book."
principles:
