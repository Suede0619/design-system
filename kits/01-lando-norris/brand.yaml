# Lando Norris — atomic brand kit (machine-readable)
# Generated from the Design System Atlas. Hand this folder to a human or an agent.
kit_version: "1.0"
system:
  id: "01"
  name: "Lando Norris"
  reference_url: "https://landonorris.com"
  award: "Awwwards Site of the Year 2025"
  category: "Cinematic Sports / Dark Mode"
  mode: "dark"
voice:
  tagline: "High-contrast dark cinema where every scroll accelerates through a tunnel of papaya orange and white."
  signature: "Full-viewport video backgrounds with aggressive typographic overlay — headlines at 120px+ sitting directly on top of moving footage. Creates a broadcast-quality sports title sequence feel. Horizontal scroll sections use scroll-snap to push through content like accelerating through gears."
principles:
  - "Video is the primary medium, not decoration"
  - "Enormous, unapologetic typography"
  - "Orange only for interactive highlights, never large fills"
  - "High-contrast white-on-black backbone"
  - "Flat and cinematic, no shadows"
