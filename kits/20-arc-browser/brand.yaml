kit_version: "1.0"
system:
  id: "20"
  name: "Arc Browser"
  reference_url: "https://arc.net"
  award: "Multiple design awards"
  category: "Browser / Gradient Whimsy"
  mode: "light"
voice:
  tagline: "A browser that loves you back — soft gradient pills, floating screenshots, and warm Mac-native whimsy."
  signature: "The 999px gradient pill is Arc's signature — every button, badge, and form element is soft and approachable. Floating screenshots breathe via a float animation whose shadow grows as the screen rises. The lavender → coral → teal gradient maps the emotional spectrum of browsing."
principles:
  - "Whimsical warmth controlled enough to feel sophisticated"
  - "Nothing has a sharp corner — pill shapes everywhere"
  - "Illustration is load-bearing, not decorative"
  - "Gradient restraint tells a product story"
  - "SF Pro as a Mac-native trust signal"
